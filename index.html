<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sunset</title>
<style>
  :root {
    --bg: #f5efe3;
    --ink: #1a2330;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Didot', 'Bodoni 72', 'Georgia', serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* subtle paper-grain vignette for elegance */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(26,35,48,0.10) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .stage {
    position: relative;
    width: min(720px, 86vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
  }

  /* top + bottom hairlines that draw out from center */
  .rule {
    position: absolute;
    left: 50%;
    height: 1px;
    background: var(--ink);
    width: 0;
    transform: translateX(-50%);
    animation: ruleDraw 1.6s cubic-bezier(.6,.0,.2,1) 0.3s forwards,
               ruleOut  0.9s cubic-bezier(.6,.0,.7,.2) 4.6s forwards;
  }
  .rule.top    { top: -36px; }
  .rule.bottom { bottom: -36px; }

  @keyframes ruleDraw { to { width: 100%; } }
  @keyframes ruleOut  { to { opacity: 0; transform: translateX(-50%) scaleY(0); } }

  /* corner ticks — small luxury detail */
  .tick {
    position: absolute;
    width: 10px; height: 10px;
    border: 1px solid var(--ink);
    opacity: 0;
    animation: tickIn 0.6s ease 1.6s forwards, tickOut 0.6s ease 4.6s forwards;
  }
  .tick.tl { top: -42px; left: -10px;  border-right: 0; border-bottom: 0; }
  .tick.tr { top: -42px; right: -10px; border-left: 0;  border-bottom: 0; }
  .tick.bl { bottom: -42px; left: -10px;  border-right: 0; border-top: 0; }
  .tick.br { bottom: -42px; right: -10px; border-left: 0;  border-top: 0; }
  @keyframes tickIn  { to { opacity: 0.55; } }
  @keyframes tickOut { to { opacity: 0; } }

  /* the logo lockup */
  .logo {
    width: 100%;
    opacity: 0;
    transform: scale(0.985);
    animation: logoIn   1.4s cubic-bezier(.2,.7,.2,1) 0.9s forwards,
               breathe  6s  ease-in-out 2.4s infinite,
               logoOut  1.0s cubic-bezier(.6,.0,.7,.2) 4.8s forwards;
  }
  .logo img { width: 100%; height: auto; display: block; }

  @keyframes logoIn  {
    0%   { opacity: 0; transform: scale(0.985) translateY(6px); filter: blur(6px); }
    100% { opacity: 1; transform: scale(1)     translateY(0);   filter: blur(0); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.008); }
  }
  @keyframes logoOut {
    0%   { opacity: 1; transform: scale(1); filter: blur(0); }
    100% { opacity: 0; transform: scale(1.04); filter: blur(4px); }
  }

  /* elegant vertical sweep of light across the lockup */
  .sweep {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    mix-blend-mode: overlay;
  }
  .sweep::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 30%;
    left: -40%;
    background: linear-gradient(100deg,
      transparent 0%,
      rgba(255,255,255,0.0) 30%,
      rgba(255,255,255,0.85) 50%,
      rgba(255,255,255,0.0) 70%,
      transparent 100%);
    animation: sweep 2.4s cubic-bezier(.4,.0,.2,1) 2.6s forwards;
    filter: blur(2px);
  }
  @keyframes sweep {
    0%   { left: -40%; }
    100% { left: 110%; }
  }

  .caption {
    margin-top: 28px;
    font-family: 'Didot', 'Bodoni 72', Georgia, serif;
    font-size: 11px;
    letter-spacing: 0.6em;
    color: var(--ink);
    opacity: 0;
    text-indent: 0.6em; /* keep optical centering with letter-spacing */
    animation: capIn 1.0s ease 2.2s forwards, capOut 0.6s ease 4.6s forwards;
  }
  @keyframes capIn  { to { opacity: 0.55; } }
  @keyframes capOut { to { opacity: 0; transform: translateY(-4px); } }

  /* final fade to white before redirect */
  .veil {
    position: fixed; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    animation: veil 1.2s ease-in 5.4s forwards;
    z-index: 10;
  }
  @keyframes veil { to { opacity: 1; } }
</style>
</head>
<body>
  <div class="stage">
    <span class="rule top"></span>
    <span class="tick tl"></span>
    <span class="tick tr"></span>

    <div class="logo">
      <img src="Sunset-logo.png" alt="Sunset" />
      <div class="sweep"></div>
    </div>

    <div class="caption">EST · RIDE INTO THE SUNSET</div>

    <span class="rule bottom"></span>
    <span class="tick bl"></span>
    <span class="tick br"></span>
  </div>

  <div class="veil"></div>

<script>
  // redirect after the veil completes
  setTimeout(() => { window.location.href = 'https://sunsethq.com'; }, 6500);
  // click anywhere to skip
  document.addEventListener('click', () => { window.location.href = 'https://sunsethq.com'; });
</script>
</body>
</html>
