<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Sunset — Therapeutic Hyperframe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: radial-gradient(ellipse at center, #2a3647 0%, #0d141d 80%);
    font-family: Georgia, serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f0e6d2;
  }

  .stage {
    position: relative;
    width: min(440px, 80vmin);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* concentric breathing rings — the "hyperframes" */
  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(240, 230, 210, 0.25);
    opacity: 0;
    animation: breathe 6s ease-in-out infinite;
  }
  .ring:nth-child(1) { animation-delay: 0s; }
  .ring:nth-child(2) { animation-delay: 1.5s; }
  .ring:nth-child(3) { animation-delay: 3.0s; }
  .ring:nth-child(4) { animation-delay: 4.5s; }

  @keyframes breathe {
    0%   { transform: scale(0.55); opacity: 0; border-color: rgba(240,230,210,0.45); }
    40%  { opacity: 0.6; }
    100% { transform: scale(1.35); opacity: 0; border-color: rgba(240,230,210,0.05); }
  }

  .logo {
    position: relative;
    width: 70%;
    height: 70%;
    animation: float 6s ease-in-out infinite;
    filter: drop-shadow(0 0 22px rgba(240,230,210,0.15));
    z-index: 5;
  }
  .logo svg { width: 100%; height: 100%; display: block; }

  @keyframes float {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.04) translateY(-4px); }
  }

  /* mane shimmer when neighing */
  .logo.neigh { animation: float 6s ease-in-out infinite, neigh 1.6s ease-out; }
  @keyframes neigh {
    0%   { filter: drop-shadow(0 0 22px rgba(240,230,210,0.15)); }
    20%  { transform: scale(1.08) translateY(-8px) rotate(-2deg); filter: drop-shadow(0 0 40px rgba(255,230,180,0.55)); }
    60%  { transform: scale(1.02) translateY(-2px) rotate(1deg); }
    100% { transform: scale(1) translateY(0) rotate(0); filter: drop-shadow(0 0 22px rgba(240,230,210,0.15)); }
  }

  .hint {
    position: absolute;
    bottom: -56px;
    left: 0; right: 0;
    text-align: center;
    letter-spacing: 0.35em;
    font-size: 11px;
    opacity: 0.55;
  }
</style>
</head>
<body>
  <div class="stage" id="stage" title="click for a gentle neigh">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>

    <div class="logo" id="logo">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2f3d52"/>
            <stop offset="100%" stop-color="#1a2330"/>
          </radialGradient>
        </defs>
        <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
        <circle cx="100" cy="100" r="92" fill="none" stroke="#f0e6d2" stroke-width="2"/>

        <!-- ground hint -->
        <path d="M30,140 Q100,128 170,142" stroke="#f0e6d2" stroke-width="1" fill="none" opacity="0.35"/>

        <!-- horse silhouette (stylized) -->
        <g fill="#f0e6d2" transform="translate(40,55)">
          <!-- body -->
          <path d="M20,55
                   C20,42 32,34 48,34
                   C58,30 72,28 84,32
                   C92,22 100,18 108,22
                   C112,16 118,14 122,18
                   L126,12 L128,20
                   C132,22 132,28 128,32
                   C130,38 126,44 118,46
                   C116,52 110,56 104,54
                   L100,66 L96,80 L92,80 L94,66 L80,62
                   L74,80 L70,80 L72,62
                   L50,60 L46,80 L42,80 L44,58
                   L28,60 L24,80 L20,80 L22,58 Z"/>
          <!-- mane streaks -->
          <path d="M108,22 C112,12 116,8 122,8 L120,18" stroke="#f0e6d2" stroke-width="1.2" fill="none" opacity="0.7"/>
          <path d="M112,26 C118,18 124,16 128,18" stroke="#f0e6d2" stroke-width="1" fill="none" opacity="0.5"/>
          <!-- eye (negative) -->
          <circle cx="118" cy="24" r="0.9" fill="#1a2330"/>
        </g>
      </svg>
    </div>

    <div class="hint">CLICK FOR A GENTLE NEIGH</div>
  </div>

<script>
  // Synthesize a soft horse-neigh using Web Audio API.
  // A descending whinny: rapid pitch wobble + breathy noise tail.
  const stage = document.getElementById('stage');
  const logo  = document.getElementById('logo');
  let ctx;

  function neigh() {
    ctx = ctx || new (window.AudioContext || window.webkitAudioContext)();
    const t0 = ctx.currentTime;
    const dur = 1.4;

    // Tonal whinny — sawtooth with vibrato, descending
    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(720, t0);
    osc.frequency.exponentialRampToValueAtTime(620, t0 + 0.15);
    osc.frequency.exponentialRampToValueAtTime(480, t0 + 0.55);
    osc.frequency.exponentialRampToValueAtTime(300, t0 + dur);

    // vibrato
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 22;
    lfoGain.gain.value = 35;
    lfo.connect(lfoGain).connect(osc.frequency);

    // formant-ish bandpass to soften the saw
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 900;
    bp.Q.value = 4;

    oscGain.gain.setValueAtTime(0, t0);
    oscGain.gain.linearRampToValueAtTime(0.18, t0 + 0.05);
    oscGain.gain.linearRampToValueAtTime(0.22, t0 + 0.4);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

    osc.connect(bp).connect(oscGain).connect(ctx.destination);

    // breath noise tail
    const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = noiseBuf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const noise = ctx.createBufferSource();
    noise.buffer = noiseBuf;
    const nFilt = ctx.createBiquadFilter();
    nFilt.type = 'highpass';
    nFilt.frequency.value = 1200;
    const nGain = ctx.createGain();
    nGain.gain.setValueAtTime(0, t0);
    nGain.gain.linearRampToValueAtTime(0.06, t0 + 0.1);
    nGain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    noise.connect(nFilt).connect(nGain).connect(ctx.destination);

    osc.start(t0); lfo.start(t0); noise.start(t0);
    osc.stop(t0 + dur + 0.05);
    lfo.stop(t0 + dur + 0.05);
    noise.stop(t0 + dur + 0.05);

    // visual reaction
    logo.classList.remove('neigh');
    void logo.offsetWidth;
    logo.classList.add('neigh');
  }

  stage.addEventListener('click', neigh);
  // a gentle, automatic neigh every 12s
  setInterval(neigh, 12000);
  // first neigh after a short pause (requires user gesture on some browsers)
  window.addEventListener('load', () => setTimeout(() => { try { neigh(); } catch(e){} }, 1500));
</script>
</body>
</html>
